# Raspberry Pi PV simulation configuration.
#
# Percentages can be written as fractions (0.50) or percentages (50).
# Panel azimuth uses pvlib convention: 0=true north, 90=east, 180=south,
# 270=west. For New Zealand, true north is the usual fixed-panel direction.

simulation:
  year: 2025
  operation_mode: sunset_to_sunrise

location:
  name: New Plymouth, New Zealand
  latitude: -39.0556
  longitude: 174.0752
  timezone: Pacific/Auckland

pv_panel:
  rated_power_w: 40.0
  tilt_deg: 45.0
  azimuth_deg: 0.0
  gamma_pdc_per_c: -0.004

battery:
  capacity_ah: 20.0
  nominal_voltage_v: 12.8
  min_soc: 0.10
  max_soc: 0.80

load_profile:
  idle:
    fraction: 0.75
    power_w: 2.4
  moderate:
    fraction: 0.20
    power_w: 5.0
  heavy:
    fraction: 0.05
    power_w: 8.9

losses:
  charge_efficiency: 0.90

weather_cache:
  enabled: true
  directory: weather_cache
  refresh: false

output:
  save_plot: outputs/raspi_pv_2025.png
  show_plot: true
